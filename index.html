<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git CMT | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <i data-lucide="git-branch"></i>
            Git CMT
        </div>
        <nav>
            <ul class="nav-links">
                <li class="nav-item active">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </li>
                <li class="nav-item">
                    <i data-lucide="history"></i>
                    Commit History
                </li>
                <li class="nav-item">
                    <i data-lucide="bar-chart-3"></i>
                    Analytics
                </li>
                <li class="nav-item">
                    <i data-lucide="settings"></i>
                    Settings
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <div>
                <h1>Contribution Overview</h1>
                <p style="color: var(--text-muted);">Welcome back, Developer</p>
            </div>
            <div class="user-info">
                <span class="avatar">K</span>
                <span>kavithakanagaraj470@gmail.com</span>
            </div>
        </header>

        <section class="stats-grid" id="stats-container">
            <!-- Stats will be loaded by JS -->
            <div class="stat-card">
                <p class="stat-label">Total Commits</p>
                <h3 class="stat-value" id="total-commits">1,284</h3>
            </div>
            <div class="stat-card">
                <p class="stat-label">Productive Month</p>
                <h3 class="stat-value">March 2026</h3>
            </div>
            <div class="stat-card">
                <p class="stat-label">Repo Status</p>
                <h3 class="stat-value" style="color: var(--accent);">Connected</h3>
            </div>
            <div class="stat-card">
                <p class="stat-label">Last Commit</p>
                <h3 class="stat-value" style="font-size: 1rem;">2026-01-01 18:00</h3>
            </div>
        </section>

        <section class="activity-section">
            <div class="section-title">
                Recent Activity
                <button style="background: none; border: 1px solid var(--border); color: var(--text-main); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-size: 0.8rem;">View All</button>
            </div>
            <div class="activity-list" id="activity-list">
                <!-- Activity items will be loaded by JS -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
